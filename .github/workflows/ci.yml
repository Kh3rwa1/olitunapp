name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

      - name: Build web (verify required dart-defines)
        run: |
          flutter build web \
            --dart-define=APPWRITE_ENDPOINT=https://example.com/v1 \
            --dart-define=APPWRITE_PROJECT_ID=ci-test-project \
            --dart-define=ADMIN_TEAM_ID=admins \
            --dart-define=TRANSLATE_URL=https://example.com/fn \
            --dart-define=UPLOAD_BASE_URL=https://example.com
