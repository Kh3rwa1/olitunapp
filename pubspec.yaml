name: itun
description: Olitun - Premium Ol Chiki (Santali Script) Learning App
publish_to: 'none'
version: 1.0.7+13

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local Storage
  shared_preferences: 2.5.3

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  fl_chart: ^0.70.2

  # Audio & Video
  audioplayers: ^6.5.1
  video_player: ^2.9.1
  cached_video_player_plus: ^3.0.0
  lottie: ^3.3.1


  # Auth
  appwrite: 21.1.0

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  image_picker: ^1.1.2
  file_picker: ^10.3.10
  path: ^1.9.1
  http: ^1.2.0
  http_parser: ^4.0.0

  # Icons
  cupertino_icons: ^1.0.8

  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.2
  record: ^6.2.0
  permission_handler: ^12.0.1
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  json_serializable: ^6.9.4

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/videos/



  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf
          weight: 400
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: fonts/Poppins-Bold.ttf
          weight: 700
    - family: OlChiki
      fonts:
        - asset: fonts/OlChiki.ttf
