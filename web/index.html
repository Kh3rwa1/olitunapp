<!DOCTYPE html>
<html lang="en">

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- SEO & PWA Meta -->
  <meta name="description"
    content="Olitun - Learn the Ol Chiki script and Santali language with interactive lessons, quizzes, and practice exercises.">
  <meta name="theme-color" content="#10B981">
  <meta name="color-scheme" content="dark light">

  <!-- Open Graph -->
  <meta property="og:title" content="Olitun - Learn Ol Chiki">
  <meta property="og:description"
    content="Interactive Santali language learning app with lessons, quizzes, and practice.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://olitun.in">

  <!-- iOS PWA Meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Olitun">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Olitun - Learn Ol Chiki</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://sgp.cloud.appwrite.io" crossorigin>
  <link rel="dns-prefetch" href="https://sgp.cloud.appwrite.io">
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <link rel="preload" href="main.dart.js" as="script">

  <!-- Preload critical fonts -->
  <style>
    /* Splash screen styling while Flutter loads */
    body {
      margin: 0;
      background: linear-gradient(135deg, #fbfffd 0%, #eef8f3 46%, #d9fae9 100%);
      overflow: hidden;
    }

    #loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 22px;
      padding: clamp(56px, 9vh, 96px) 24px 32px;
      box-sizing: border-box;
      background:
        radial-gradient(circle at 50% 18%, rgba(16, 185, 129, 0.24), transparent 34%),
        linear-gradient(135deg, #fbfffd 0%, #eef8f3 46%, #d9fae9 100%);
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #111827;
      transition: opacity 0.4s ease;
    }

    #loading-indicator .brand-mark {
      width: 112px;
      height: 112px;
      border-radius: 28px;
      background: #3edb80;
      box-shadow: 0 26px 70px rgba(16, 185, 129, 0.28);
      display: grid;
      place-items: center;
    }

    #loading-indicator .brand-mark img {
      width: 74px;
      height: 74px;
      object-fit: contain;
    }

    #loading-indicator h1 {
      margin: 4px 0 0;
      color: #35dd80;
      font-size: clamp(46px, 8vw, 66px);
      font-weight: 900;
      line-height: 0.95;
    }

    #loading-indicator p {
      margin: -6px 0 28px;
      font-size: 18px;
      font-weight: 700;
      color: #374151;
    }

    .loading-features {
      width: min(100%, 1120px);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .loading-card {
      min-height: 96px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      display: grid;
      place-items: center;
      text-align: center;
      font-weight: 800;
    }

    .loading-card span {
      display: block;
      margin-top: 6px;
      color: #9ca3af;
      font-size: 13px;
      font-weight: 700;
    }

    .loading-bar {
      width: min(100%, 1120px);
      height: 58px;
      border-radius: 16px;
      background: #35d675;
      box-shadow: 0 22px 52px rgba(16, 185, 129, 0.26);
      position: relative;
      overflow: hidden;
    }

    .loading-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 42%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28), transparent);
      animation: shimmer 1.1s ease-in-out infinite;
    }

    @keyframes shimmer {
      from {
        transform: translateX(-120%);
      }
      to {
        transform: translateX(260%);
      }
    }

    @media (max-width: 760px) {
      #loading-indicator {
        padding-top: 56px;
      }

      #loading-indicator .brand-mark {
        width: 96px;
        height: 96px;
        border-radius: 24px;
      }

      .loading-features {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .loading-card {
        min-height: 78px;
      }
    }

    /* Offline indicator */
    #offline-indicator {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #EF4444;
      color: #fff;
      text-align: center;
      padding: 6px;
      font-size: 13px;
      font-family: -apple-system, sans-serif;
      z-index: 100000;
    }
  </style>
</head>

<body>
  <!-- Loading indicator shown while Flutter initializes -->
  <div id="loading-indicator">
    <div class="brand-mark">
      <img src="icons/Icon-192.png" alt="" fetchpriority="high">
    </div>
    <h1>Olitun</h1>
    <p>Learn Ol Chiki Script</p>
    <div class="loading-features" aria-hidden="true">
      <div class="loading-card">Interactive<span>Learn by doing</span></div>
      <div class="loading-card">Structured<span>Step-by-step lessons</span></div>
      <div class="loading-card">Gamified<span>Earn rewards</span></div>
    </div>
    <div class="loading-bar" aria-hidden="true"></div>
  </div>

  <!-- Offline indicator -->
  <div id="offline-indicator">You are offline. Some features may be unavailable.</div>

  <script src="flutter_bootstrap.js" async></script>
  <script src="pwa_install.js" defer></script>

  <script>
    // Remove loading indicator when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('loading-indicator');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(function() { loader.remove(); }, 400);
      }
    });

    // Offline/Online detection
    window.addEventListener('offline', function() {
      document.getElementById('offline-indicator').style.display = 'block';
    });
    window.addEventListener('online', function() {
      document.getElementById('offline-indicator').style.display = 'none';
    });
  </script>
</body>

</html>
