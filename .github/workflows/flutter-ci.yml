name: Flutter CI

on:
  push:
  pull_request:

jobs:
  analyze-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test with coverage
        run: flutter test --coverage

      - name: Enforce coverage threshold
        run: |
          TOTAL=$(lcov --summary coverage/lcov.info 2>&1 | grep 'lines' | sed 's/.*: //' | sed 's/%.*//')
          echo "Coverage: ${TOTAL}%"
          if [ "$(echo "$TOTAL < 40" | bc -l)" -eq 1 ]; then
            echo "::error::Test coverage ${TOTAL}% is below 40% threshold"
            exit 1
          fi

      - name: Smoke tests
        run: flutter test test/smoke

      - name: Check outdated dependencies
        run: flutter pub outdated --no-dev-dependencies || true

      - name: Build web release
        run: flutter build web --release --dart-define=APPWRITE_ENDPOINT=https://example.com/v1 --dart-define=APPWRITE_PROJECT_ID=ci --dart-define=TRANSLATE_URL=https://example.com

      - name: Build Android release
        run: flutter build apk --release --dart-define=APPWRITE_ENDPOINT=https://example.com/v1 --dart-define=APPWRITE_PROJECT_ID=ci --dart-define=TRANSLATE_URL=https://example.com

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: release-builds
          path: |
            build/web/
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
