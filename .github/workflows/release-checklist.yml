name: Release Checklist

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.9+15)'
        required: true
      deploy_web:
        description: 'Deploy web to production'
        type: boolean
        default: true

permissions:
  contents: write

env:
  APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
  APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
  TRANSLATE_URL: ${{ secrets.TRANSLATE_URL }}

jobs:
  # Phase 1: Validate environment
  env-validation:
    name: "1. Environment Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          MISSING=""
          [ -z "$APPWRITE_ENDPOINT" ] && MISSING="$MISSING APPWRITE_ENDPOINT"
          [ -z "$APPWRITE_PROJECT_ID" ] && MISSING="$MISSING APPWRITE_PROJECT_ID"
          [ -z "$TRANSLATE_URL" ] && MISSING="$MISSING TRANSLATE_URL"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi
          echo "✅ All required environment variables are set."

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION. Expected: X.Y.Z+BUILD"
            exit 1
          fi
          echo "✅ Version format is valid: $VERSION"

  # Phase 2: Build + Tests
  build-test:
    name: "2. Build & Test"
    runs-on: ubuntu-latest
    needs: env-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version in pubspec.yaml
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i -E "s/^version: .*/version: $VERSION/" pubspec.yaml

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Static analysis
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Enforce coverage threshold (40%)
        run: |
          TOTAL=$(lcov --summary coverage/lcov.info 2>&1 | grep 'lines' | sed 's/.*: //' | sed 's/%.*//')
          echo "Coverage: ${TOTAL}%"
          if [ "$(echo "$TOTAL < 40" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below 40% release threshold"
            exit 1
          fi

      - name: Smoke tests
        run: flutter test test/smoke

      - name: Build web release
        run: |
          flutter build web --release \
            --dart-define=APPWRITE_ENDPOINT=${{ secrets.APPWRITE_ENDPOINT }} \
            --dart-define=APPWRITE_PROJECT_ID=${{ secrets.APPWRITE_PROJECT_ID }} \
            --dart-define=TRANSLATE_URL=${{ secrets.TRANSLATE_URL }}

      - name: Build Android release
        run: |
          flutter build apk --release \
            --dart-define=APPWRITE_ENDPOINT=${{ secrets.APPWRITE_ENDPOINT }} \
            --dart-define=APPWRITE_PROJECT_ID=${{ secrets.APPWRITE_PROJECT_ID }} \
            --dart-define=TRANSLATE_URL=${{ secrets.TRANSLATE_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.event.inputs.version }}
          path: |
            build/web/
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # Phase 3: Smoke deploy (web)
  smoke-deploy:
    name: "3. Smoke Deploy"
    runs-on: ubuntu-latest
    needs: build-test
    if: ${{ github.event.inputs.deploy_web == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-${{ github.event.inputs.version }}
          path: build/

      - name: Verify web build artifacts exist
        run: |
          if [ ! -f "build/web/index.html" ]; then
            echo "::error::Web build artifacts missing — build/web/index.html not found"
            exit 1
          fi
          FILE_COUNT=$(find build/web -type f | wc -l)
          echo "✅ Web build verified: $FILE_COUNT files"

      - name: Verify APK exists
        run: |
          if [ ! -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "::warning::APK not found in artifacts — Android build may have been skipped"
          else
            APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)
            echo "✅ APK verified: $APK_SIZE"
          fi

  # Phase 4: Tag release
  tag-release:
    name: "4. Tag Release"
    runs-on: ubuntu-latest
    needs: [build-test, smoke-deploy]
    if: always() && needs.build-test.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Commit version bump and create release tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i -E "s/^version: .*/version: $VERSION/" pubspec.yaml
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -a -m "chore(release): bump version to $VERSION" || true
          git push origin HEAD
          git tag "v$VERSION"
          git push origin "v$VERSION"
          echo "✅ Tagged release: v$VERSION"

      - name: Generate release summary
        run: |
          echo "## Release ${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ✅ Validated |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ✅ ≥40% |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Build | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| Android Build | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | ✅ v${{ github.event.inputs.version }} |" >> $GITHUB_STEP_SUMMARY
